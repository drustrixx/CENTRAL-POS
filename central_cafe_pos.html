<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Central Cafe POS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --gold:#FFD700;--gold2:#c9a84c;--dark:#0b0b0b;--dark2:#111008;
    --card-bg:#141008;--card-border:#3a2800;--card-hover:#1e1800;
    --purple:#7B1FA2;--orange:#E65100;--blue:#1565C0;--green:#2E7D32;--red:#B71C1C;
  }
  html,body{height:100%;background:var(--dark);color:#f0e6c8;font-family:'Sarabun',sans-serif}
  
  /* ===== LAYOUT ===== */
  .app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
  
  /* ===== HEADER ===== */
  .header{
    text-align:center;padding:18px 24px 14px;
    background:linear-gradient(180deg,#1c0e00 0%,#0d0800 100%);
    border-bottom:2px solid #6b4f00;
    position:relative;flex-shrink:0;
  }
  .header-logo{font-family:'Cinzel',serif;font-size:32px;color:var(--gold);letter-spacing:3px;line-height:1.1}
  .header-sub{font-size:13px;color:#9a8060;letter-spacing:2px;margin-top:2px}
  .header-sess{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:11px;color:#666;background:#151515;padding:6px 12px;border-radius:8px;border:1px solid #2a2a2a;line-height:1.6}

  /* ===== MAIN BODY ===== */
  .body{display:flex;flex:1;overflow:hidden}
  
  /* ===== MENU PANEL ===== */
  .menu-panel{flex:1;overflow-y:auto;padding:20px 24px;background:var(--dark2)}
  .menu-panel::-webkit-scrollbar{width:6px}
  .menu-panel::-webkit-scrollbar-track{background:#0a0a0a}
  .menu-panel::-webkit-scrollbar-thumb{background:#3a2800;border-radius:4px}

  .sec-label{
    font-size:11px;letter-spacing:3px;text-transform:uppercase;
    color:var(--gold);margin-bottom:14px;margin-top:4px;
    display:flex;align-items:center;gap:10px;
  }
  .sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#3a2800,transparent)}
  
  .menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
    gap:16px;margin-bottom:28px;
  }

  /* ===== MENU CARD ===== */
  .card{
    background:var(--card-bg);border:1.5px solid var(--card-border);
    border-radius:14px;padding:16px 12px 14px;
    cursor:pointer;transition:all .22s ease;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    position:relative;overflow:hidden;
  }
  .card::before{
    content:'';position:absolute;inset:0;
    background:radial-gradient(circle at 50% 0%,rgba(255,215,0,.06),transparent 65%);
    pointer-events:none;
  }
  .card:hover{border-color:var(--gold);background:var(--card-hover);transform:translateY(-4px);box-shadow:0 8px 24px rgba(255,180,0,.12)}
  .card:active{transform:scale(.97)}
  
  .card-img{
    width:130px;height:106px;object-fit:contain;
    border-radius:10px;margin-bottom:12px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.6));
    transition:transform .22s;
  }
  .card:hover .card-img{transform:scale(1.06)}
  
  .card-tag{
    position:absolute;top:8px;left:8px;
    font-size:9px;padding:3px 8px;border-radius:5px;font-weight:700;letter-spacing:.5px;
  }
  .tag-f{background:#3a0e00;color:#FF7043;border:1px solid rgba(255,112,67,.5)}
  .tag-d{background:#052010;color:#66BB6A;border:1px solid rgba(102,187,106,.5)}
  .tag-s{background:#170a30;color:#CE93D8;border:1px solid rgba(156,39,176,.5)}
  
  .card-name{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:5px;line-height:1.2}
  .card-price{font-size:12px;color:#c8b080}
  
  .card-btn{
    margin-top:12px;width:100%;padding:7px;
    background:linear-gradient(135deg,#8B6914,#c9a84c);
    border:none;border-radius:8px;
    font-size:12px;font-weight:700;color:#1a0d00;cursor:pointer;
    font-family:'Sarabun',sans-serif;transition:all .2s;
  }
  .card-btn:hover{background:linear-gradient(135deg,#c9a84c,#FFD700);transform:scale(1.02)}
  .card-btn:active{transform:scale(.97)}

  /* ===== BILL PANEL ===== */
  .bill-panel{
    width:320px;flex-shrink:0;
    background:#0a0800;border-left:2px solid #3a2800;
    display:flex;flex-direction:column;
  }
  
  .bill-head{
    padding:16px 18px;
    background:linear-gradient(180deg,#1c0e00,#100900);
    border-bottom:1px solid #2a1e00;flex-shrink:0;
  }
  .bill-head-row{display:flex;align-items:center;gap:8px}
  .bill-title{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);font-weight:600}
  .bill-sub{font-size:10px;color:#555;margin-top:3px}
  
  .bill-items{flex:1;overflow-y:auto;padding:12px 16px}
  .bill-items::-webkit-scrollbar{width:4px}
  .bill-items::-webkit-scrollbar-thumb{background:#2a1e00;border-radius:2px}
  
  .empty-msg{text-align:center;color:#2a2a2a;font-size:13px;padding:32px 0;line-height:2}
  
  .brow{
    display:flex;align-items:center;gap:6px;
    padding:7px 0;border-bottom:1px solid #1a1500;
  }
  .brow-name{font-size:11px;color:#d4c090;flex:1;line-height:1.3}
  .qty-wrap{display:flex;align-items:center;gap:3px;flex-shrink:0}
  .qb{
    width:20px;height:20px;border-radius:5px;
    border:1px solid #3a2800;background:#1a1000;
    color:var(--gold);cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;transition:all .15s;
  }
  .qb:hover{background:#3a2800;border-color:var(--gold)}
  .qn{font-size:11px;min-width:20px;text-align:center;color:var(--gold);font-weight:700}
  .brow-price{font-size:11px;color:#c8b080;min-width:54px;text-align:right;flex-shrink:0}
  
  /* ===== BILL FOOTER ===== */
  .bill-foot{padding:14px 16px;border-top:1px solid #2a1e00;flex-shrink:0;background:#090700}
  
  .summary-box{
    background:#111008;border:1px solid #2a1e00;
    border-radius:10px;padding:10px 12px;margin-bottom:12px;
  }
  .sum-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
  .sum-label{color:#666}
  .sum-disc{color:#CE93D8;font-weight:700}
  .sum-sub{color:#888}
  .total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:8px;padding-top:8px;border-top:1px solid #2a1e00}
  .total-label{font-size:13px;color:var(--gold);font-weight:700}
  .total-num{font-size:28px;font-weight:700;color:#4CAF50;line-height:1}
  .total-cur{font-size:13px;color:#666;margin-left:3px}
  
  .btns{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
  .btn{
    padding:9px 12px;border-radius:9px;border:none;
    cursor:pointer;font-size:12px;font-weight:700;width:100%;
    font-family:'Sarabun',sans-serif;transition:all .18s;
    letter-spacing:.3px;
  }
  .btn:active{transform:scale(.98)}
  .b-disc{background:linear-gradient(135deg,#6a1b9a,#9C27B0);color:#fff}
  .b-disc:hover{background:linear-gradient(135deg,#7B1FA2,#AB47BC)}
  .b-copy{background:linear-gradient(135deg,#bf360c,#E64A19);color:#fff}
  .b-copy:hover{background:linear-gradient(135deg,#d84315,#FF5722)}
  .b-hist{background:linear-gradient(135deg,#0d47a1,#1976D2);color:#fff}
  .b-hist:hover{background:linear-gradient(135deg,#1565C0,#42A5F5)}
  .b-pay{background:linear-gradient(135deg,#1b5e20,#388E3C);color:#fff}
  .b-pay:hover{background:linear-gradient(135deg,#2E7D32,#4CAF50)}
  .b-clear{background:linear-gradient(135deg,#b71c1c,#D32F2F);color:#fff}
  .b-clear:hover{background:linear-gradient(135deg,#c62828,#EF5350)}
  
  .promo-txt{font-size:10px;color:#3a3020;text-align:center;margin-top:2px}

  /* ===== MODAL ===== */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal{
    background:#0f0b00;border:2px solid #8B6914;border-radius:16px;
    padding:22px;width:460px;max-height:78vh;display:flex;flex-direction:column;
  }
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #2a1e00}
  .modal-title{font-family:'Cinzel',serif;font-size:15px;color:var(--gold)}
  .modal-close{background:none;border:none;color:#666;font-size:20px;cursor:pointer;line-height:1}
  .modal-close:hover{color:#fff}
  .modal-body{overflow-y:auto;flex:1}
  .modal-body::-webkit-scrollbar{width:4px}
  .modal-body::-webkit-scrollbar-thumb{background:#2a1e00;border-radius:2px}
  
  .hentry{background:#0a0800;border:1px solid #2a1e00;border-radius:10px;padding:12px;margin-bottom:8px}
  .htime{font-size:10px;color:#555;margin-bottom:5px}
  .hitems{font-size:12px;color:#a89060;margin-bottom:5px;line-height:1.5}
  .htotal{font-size:13px;color:#4CAF50;font-weight:700}
  .no-hist{text-align:center;color:#2a2a2a;padding:28px;font-size:13px}

  /* ===== TOAST ===== */
  .toast{
    position:fixed;bottom:24px;right:24px;
    background:#1a1500;color:#f0e6c8;
    padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;
    opacity:0;transition:opacity .3s;pointer-events:none;
    border:1px solid #3a2800;box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">🎌 Central Cafe</div>
    <div class="header-sub">Japanese Dining POS System</div>
    <div class="header-sess" id="sessInfo">กำลังโหลด...</div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- MENU PANEL -->
    <div class="menu-panel">
      <div class="sec-label">🍣 &nbsp;เมนูอาหาร</div>
      <div class="menu-grid" id="foodGrid"></div>

      <div class="sec-label">🍹 &nbsp;เครื่องดื่ม</div>
      <div class="menu-grid" id="drinkGrid"></div>

      <div class="sec-label">⭐ &nbsp;เซ็ตพิเศษ</div>
      <div class="menu-grid" id="setGrid"></div>
    </div>

    <!-- BILL PANEL -->
    <div class="bill-panel">
      <div class="bill-head">
        <div class="bill-head-row">
          <span style="font-size:20px">📋</span>
          <span class="bill-title">Order Bill</span>
        </div>
        <div class="bill-sub" id="billSub">โต๊ะส่วนตัวของคุณ</div>
      </div>

      <div class="bill-items" id="billItems">
        <div class="empty-msg">ยังไม่มีรายการ<br>กดเมนูเพื่อเพิ่มรายการ</div>
      </div>

      <div class="bill-foot">
        <div class="summary-box">
          <div class="sum-row"><span class="sum-label">ส่วนลด</span><span class="sum-disc" id="discLabel">0%</span></div>
          <div class="sum-row"><span class="sum-label">ราคาก่อนลด</span><span class="sum-sub" id="subVal">0 บาท</span></div>
          <div class="total-row">
            <span class="total-label">ยอดรวม</span>
            <div><span class="total-num" id="totVal">0</span><span class="total-cur">บาท</span></div>
          </div>
        </div>
        <div class="btns">
          <button class="btn b-disc" onclick="addDisc()">+5% ส่วนลด</button>
          <button class="btn b-copy" onclick="copyBill()">📋 คัดลอกบิล</button>
          <button class="btn b-hist" onclick="openHist()">📜 ประวัติบิล</button>
          <button class="btn b-pay"  onclick="payBill()">✅ ชำระเงิน &amp; บันทึกบิล</button>
          <button class="btn b-clear" onclick="clearBill()">🗑️ เคลียร์บิล</button>
        </div>
        <div class="promo-txt">กดซ้ำเพื่อสะสมส่วนลดทีละ 5%</div>
      </div>
    </div>

  </div><!-- /body -->
</div><!-- /app -->

<!-- HISTORY MODAL -->
<div id="histOverlay" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">📜 ประวัติบิลทั้งหมด</span>
      <button class="modal-close" onclick="document.getElementById('histOverlay').style.display='none'">✕</button>
    </div>
    <div class="modal-body" id="histList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

const MENUS={
  food:[
    {id:'f1',name:'Salmon Sashimi',price:220,img:IMGS.img_salmon_sashimi,tag:'อาหาร'},
    {id:'f2',name:'Tuna Sashimi',  price:220,img:IMGS.img_tuna_sashimi,  tag:'อาหาร'},
    {id:'f3',name:'Premium Unagi', price:220,img:IMGS.img_unagi,         tag:'อาหาร'},
    {id:'f4',name:'Grand Maguro',  price:220,img:IMGS.img_maguro,        tag:'อาหาร'},
    {id:'f5',name:'Salmon Nigiri', price:220,img:IMGS.img_salmon_nigiri, tag:'อาหาร'},
  ],
  drink:[
    {id:'d1',name:'Matcha',       price:180,img:IMGS.img_matcha, tag:'เครื่องดื่ม'},
    {id:'d2',name:'Lychee Dream', price:180,img:IMGS.img_lychee, tag:'เครื่องดื่ม'},
    {id:'d3',name:'Lemon Shine',  price:180,img:IMGS.img_lemon,  tag:'เครื่องดื่ม'},
  ],
  set:[
    {id:'s1',name:'Signature Set',price:590,img:IMGS.img_signature,tag:'เซ็ต'},
    {id:'s2',name:'Premier Set',  price:790,img:IMGS.img_premier,  tag:'เซ็ต'},
  ]
};

const SID='โต๊ะ-'+Math.random().toString(36).slice(2,5).toUpperCase();
let order={}, disc=0;

document.getElementById('sessInfo').textContent=SID+' (เซสชันนี้เท่านั้น)';
document.getElementById('billSub').textContent=SID;

function tagClass(t){return t==='อาหาร'?'tag-f':t==='เครื่องดื่ม'?'tag-d':'tag-s';}

function renderMenus(){
  const cats=[['food','foodGrid'],['drink','drinkGrid'],['set','setGrid']];
  cats.forEach(([cat,gid])=>{
    document.getElementById(gid).innerHTML=MENUS[cat].map(m=>`
      <div class="card" onclick="addItem('${m.id}','${m.name}',${m.price})">
        <span class="card-tag ${tagClass(m.tag)}">${m.tag}</span>
        <img class="card-img" src="${m.img}" alt="${m.name}">
        <div class="card-name">${m.name}</div>
        <div class="card-price">${m.price.toLocaleString()} บาท</div>
        <button class="card-btn">เพิ่มรายการ</button>
      </div>`).join('');
  });
}

function addItem(id,name,price){
  if(!order[id]) order[id]={name,price,qty:0};
  order[id].qty++;
  renderBill();
  toast('✓ เพิ่ม '+name+' แล้ว');
}

function changeQty(id,d){
  if(!order[id])return;
  order[id].qty+=d;
  if(order[id].qty<=0) delete order[id];
  renderBill();
}

function renderBill(){
  const keys=Object.keys(order);
  const el=document.getElementById('billItems');
  if(!keys.length){
    el.innerHTML='<div class="empty-msg">ยังไม่มีรายการ<br>กดเมนูเพื่อเพิ่มรายการ</div>';
  } else {
    el.innerHTML=keys.map(id=>{
      const it=order[id];
      return`<div class="brow">
        <div class="brow-name">${it.name}</div>
        <div class="qty-wrap">
          <button class="qb" onclick="changeQty('${id}',-1)">−</button>
          <span class="qn">${it.qty}</span>
          <button class="qb" onclick="changeQty('${id}',1)">+</button>
        </div>
        <div class="brow-price">${(it.price*it.qty).toLocaleString()}฿</div>
      </div>`;
    }).join('');
  }
  const sub=keys.reduce((s,id)=>s+order[id].price*order[id].qty,0);
  const d=Math.round(sub*disc/100);
  const tot=sub-d;
  document.getElementById('subVal').textContent=sub.toLocaleString()+' บาท';
  document.getElementById('totVal').textContent=tot.toLocaleString();
  document.getElementById('discLabel').textContent=disc+'%';
}

function addDisc(){
  disc=Math.min(disc+5,50);
  renderBill();
  toast('ส่วนลด '+disc+'% 🎉');
}
function clearBill(){
  order={};disc=0;renderBill();
  toast('เคลียร์บิลแล้ว');
}
function copyBill(){
  const keys=Object.keys(order);
  if(!keys.length){toast('ไม่มีรายการในบิล');return;}
  const sub=keys.reduce((s,id)=>s+order[id].price*order[id].qty,0);
  const tot=sub-Math.round(sub*disc/100);
  const lines=keys.map(id=>`${order[id].name} x${order[id].qty}  =  ${(order[id].price*order[id].qty).toLocaleString()} บาท`).join('\n');
  const txt=`╔══════════════════╗\n   Central Cafe\n   ${SID}\n╚══════════════════╝\n${lines}\n──────────────────\nส่วนลด: ${disc}%\nยอดรวม: ${tot.toLocaleString()} บาท`;
  navigator.clipboard&&navigator.clipboard.writeText(txt).then(()=>toast('คัดลอกบิลแล้ว ✓'));
}
function payBill(){
  const keys=Object.keys(order);
  if(!keys.length){toast('ไม่มีรายการในบิล');return;}
  const sub=keys.reduce((s,id)=>s+order[id].price*order[id].qty,0);
  const tot=sub-Math.round(sub*disc/100);
  const entry={time:new Date().toLocaleString('th-TH'),table:SID,items:Object.values(order).map(it=>it.name+' x'+it.qty).join(', '),sub,disc,tot};
  try{const h=JSON.parse(localStorage.getItem('cf_hist')||'[]');h.unshift(entry);if(h.length>50)h.pop();localStorage.setItem('cf_hist',JSON.stringify(h));}catch(e){}
  toast('ชำระเงิน '+tot.toLocaleString()+' บาท ✅ สำเร็จ!',3000);
  order={};disc=0;renderBill();
}
function openHist(){
  let h=[];try{h=JSON.parse(localStorage.getItem('cf_hist')||'[]');}catch(e){}
  const el=document.getElementById('histList');
  el.innerHTML=h.length?h.map(e=>`<div class="hentry">
    <div class="htime">${e.time} · ${e.table} · ส่วนลด ${e.disc}%</div>
    <div class="hitems">${e.items}</div>
    <div class="htotal">ยอดรวม: ${e.tot.toLocaleString()} บาท</div>
  </div>`).join(''):'<div class="no-hist">ยังไม่มีประวัติบิล</div>';
  document.getElementById('histOverlay').style.display='flex';
}
function toast(msg,dur=2000){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

renderMenus();renderBill();
</script>
</body>
</html>
