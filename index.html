<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Central Cafe POS</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Sarabun:wght@300;400;600;700&display=swap');

  *{box-sizing:border-box;margin:0;padding:0}

  :root{
    --gold:#FFD700;
    --gold2:#c9a84c;
    --dark:#0b0b0b;
    --dark2:#111008;
    --card-bg:#141008;
    --card-border:#3a2800;
    --card-hover:#1e1800;
    --purple:#7B1FA2;
    --orange:#E65100;
    --blue:#1565C0;
    --green:#2E7D32;
    --red:#B71C1C;
  }

  html,body{
    height:100%;
    background:var(--dark);
    color:#f0e6c8;
    font-family:'Sarabun',sans-serif;
  }

  .app{
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
  }

  /* ===== HEADER ===== */
  .header{
    text-align:center;
    padding:14px 23px 11px;
    background:linear-gradient(180deg,#1c0e00 0%,#0d0800 100%);
    border-bottom:2px solid #6b4f00;
    position:relative;
    flex-shrink:0;
  }
  .header-logo{
    font-family:'Cinzel',serif;
    font-size:28px;
    color:var(--gold);
    letter-spacing:3px;
    line-height:1.1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .header-logo-icon{
    width:32px;
    height:32px;
    border-radius:7px;
    object-fit:cover;
  }
  .header-sub{
    font-size:11px;
    color:#9a8060;
    letter-spacing:2px;
    margin-top:1px;
  }

  /* ===== MAIN BODY ===== */
  .body{
    display:flex;
    flex:1;
    overflow:hidden;
  }

  /* ===== MENU PANEL ===== */
  .menu-panel{
    flex:1;
    overflow-y:auto;
    padding:10px 18px;
    background:var(--dark2);
  }
  .menu-panel::-webkit-scrollbar{width:6px}
  .menu-panel::-webkit-scrollbar-track{background:#0a0a0a}
  .menu-panel::-webkit-scrollbar-thumb{background:#3a2800;border-radius:4px}

  /* ===== หัวข้อหมวดหมู่: อยู่หน้ารูปเสมอ ห้ามถูกบัง ===== */
  .sec-label{
    position:relative;
    z-index:5;
    font-size:13px;
    letter-spacing:3px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
    margin-top:2px;
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--dark2);
    padding:3px 4px;
  }
  .sec-label::after{
    content:'';
    flex:1;
    height:1px;
    background:linear-gradient(90deg,#3a2800,transparent);
  }

  .menu-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:14px;
    margin-bottom:16px;
  }

  /* ===== MENU CARD ===== */
  .card{
    background:var(--card-bg);
    border:1.5px solid var(--card-border);
    border-radius:12px;
    padding:12px 10px 10px;
    position:relative;
    overflow:hidden;
    transition:all .18s ease;
    cursor:pointer;
    text-align:center;
  }
  .card:hover{
    transform:translateY(-2px);
    border-color:#6b4f00;
    box-shadow:0 10px 24px rgba(0,0,0,.28);
    background:var(--card-hover);
  }

  /* ป้าย tag ให้อยู่เหนือรูปเสมอ (z-index สูงกว่ารูป) */
  .card-tag{
    position:absolute;
    top:7px;
    left:7px;
    z-index:3;
    padding:4px 8px;
    border-radius:999px;
    font-size:10px;
    font-weight:700;
    line-height:1;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
  }
  .tag-f{
    background:rgba(230,81,0,.18);
    color:#ffb47a;
    border:1px solid rgba(230,81,0,.45);
  }
  .tag-d{
    background:rgba(21,101,192,.18);
    color:#8fc4ff;
    border:1px solid rgba(21,101,192,.45);
  }
  .tag-s{
    background:rgba(123,31,162,.18);
    color:#CE93D8;
    border:1px solid rgba(156,39,176,.5);
  }

  .card-img{
    width:112px;
    height:90px;
    object-fit:cover;
    display:block;
    margin:0 auto 8px;
    border-radius:10px;
    position:relative;
    z-index:1;
    background:#1a1400;
  }

  .card-name{
    font-size:14px;
    font-weight:700;
    color:var(--gold);
    margin-bottom:3px;
    line-height:1.2;
    min-height:auto;
  }
  .card-price{
    font-size:12px;
    color:#c8b080;
  }

  .card-btn{
    margin-top:8px;
    width:100%;
    padding:7px;
    background:linear-gradient(135deg,#8B6914,#c9a84c);
    border:none;
    border-radius:8px;
    font-size:11px;
    font-weight:700;
    color:#1a0d00;
    cursor:pointer;
    font-family:'Sarabun',sans-serif;
    transition:all .2s;
  }

    background:linear-gradient(135deg,#c9a84c,#FFD700);
